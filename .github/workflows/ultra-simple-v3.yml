name: Ultra Simple Build v3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Install Gradle
        run: |
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d /opt
          echo "=== Gradle installed ==="
          /opt/gradle-8.7/bin/gradle --version
          
      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Working directory ==="
          pwd
          ls -la
          echo "=== Building APK ==="
          /opt/gradle-8.7/bin/gradle assembleDebug --no-daemon 2>&1

      - name: Find and Upload APK
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Finding APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Checking app/build ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directory not found"
          echo "=== Upload test ==="
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK found: $(ls -lh app/build/outputs/apk/debug/app-debug.apk)"
            ls -lh app/build/outputs/apk/debug/*.apk
          else
            echo "❌ APK not found at expected path"
            find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          fi
          echo "=== Done ==="

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: book-ai-analyzer-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.aab