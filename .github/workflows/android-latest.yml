name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置JDK 17
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      # 3. 设置Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. 配置Gradle缓存
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-opts: linux-aarch64,linux-x64

      # 5. 验证Gradle Wrapper
      - name: Verify Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew文件不存在"
            exit 1
          fi
          echo "✅ gradlew存在"
          ls -la gradlew

      # 6. 添加执行权限
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 7. 配置本地SDK路径
      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      # 8. 清理旧构建
      - name: Clean previous builds
        run: ./gradlew clean --no-daemon || true

      # 9. 构建Debug APK
      - name: Build Debug APK
        run: |
          echo "🔨 开始构建..."
          ./gradlew assembleDebug \
            --no-daemon \
            --no-build-cache \
            --warning-mode=all \
            --stacktrace
        continue-on-error: true

      # 10. 列出构建输出
      - name: List build outputs
        run: |
          echo "📁 构建输出目录："
          find app/build -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "未找到APK/AAB文件"

      # 11. 验证APK存在
      - name: Verify APK exists
        id: verify_apk
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK构建成功！"
            ls -lh "$APK_PATH"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ APK未生成"
            echo "=== 诊断信息 ==="
            echo "Gradle缓存目录："
            ls -la ~/.gradle/ 2>/dev/null || echo "无"
            echo "本地SDK目录："
            ls -la $ANDROID_HOME/ 2>/dev/null || echo "无"
            exit 1
          fi

      # 12. 上传APK
      - name: Upload APK
        if: steps.verify_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  lint:
    name: Run Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run lint
        run: ./gradlew lint --no-daemon || true

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          retention-days: 7