name: Fix Gradle Wrapper and Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Generate gradle-wrapper.jar
      run: |
        echo "生成gradle-wrapper.jar文件..."
        
        # 方法1: 使用gradlew wrapper命令生成
        chmod +x ./gradlew
        ./gradlew wrapper || echo "Gradle wrapper生成失败，使用备用方案"
        
        # 方法2: 如果方法1失败，手动下载
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "手动下载gradle-wrapper.jar..."
          # 下载Gradle 8.7的wrapper jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7/gradle/wrapper/gradle-wrapper.jar || \
          echo "下载失败，尝试从其他源获取"
        fi
        
        # 方法3: 如果还失败，创建最小化版本
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "创建最小化gradle-wrapper.jar..."
          # 这里可以创建一个基本的jar文件
          # 但最简单的是从其他项目复制
          echo "需要手动添加gradle-wrapper.jar文件"
        fi
        
        # 验证文件是否存在
        if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "✅ gradle-wrapper.jar已准备"
          ls -la gradle/wrapper/gradle-wrapper.jar
        else
          echo "❌ gradle-wrapper.jar未找到"
          echo "请手动添加该文件到仓库"
          exit 1
        fi
    
    - name: Build Debug APK
      run: |
        echo "开始构建APK..."
        ./gradlew assembleDebug --stacktrace
    
    - name: Verify APK
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK构建成功！"
          echo "APK大小: $(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print \$5}')"
          echo ""
          echo "🎉 问题已解决：gradle-wrapper.jar缺失问题"
        else
          echo "❌ 构建失败"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: fixed-apk
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Commit gradle-wrapper.jar back to repo
      if: success()
      run: |
        echo "将gradle-wrapper.jar提交回仓库..."
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add gradle/wrapper/gradle-wrapper.jar
        git commit -m "fix: add missing gradle-wrapper.jar" || echo "没有变化或已提交"
        git push || echo "推送失败或无权限"