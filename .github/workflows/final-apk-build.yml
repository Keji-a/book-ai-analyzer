name: Final APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system Gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gradle -qq
          gradle --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with system Gradle
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          gradle assembleDebug --no-daemon 2>&1

      - name: Debug Build Output
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo "=== App directory ==="
          ls -la app/ 2>/dev/null || echo "No app dir"
          echo "=== Build outputs ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== APK debug directory ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK debug dir"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.aab