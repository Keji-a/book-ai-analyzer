name: System Gradle Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system Gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gradle -qq
          gradle --version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Convert Kotlin DSL to Groovy
        if: failure()
        run: |
          # 如果Kotlin DSL构建失败，尝试使用Groovy DSL
          ls -la *.gradle* app/*.gradle* 2>/dev/null || true

      - name: Build with system Gradle
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          gradle assembleDebug --no-daemon 2>&1 | tee build.log
          tail -100 build.log

      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk