name: Detailed Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          echo "=== BUILD COMPLETED ==="
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK dir"

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.aab