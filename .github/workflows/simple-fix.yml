name: Simple Fix - Add Missing gradle-wrapper.jar

on:
  workflow_dispatch:

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download correct gradle-wrapper.jar
      run: |
        echo "下载正确的gradle-wrapper.jar文件..."
        
        # 方法1: 从Gradle官方仓库下载
        curl -L -o gradle-wrapper-download.jar \
          https://repo.maven.apache.org/maven2/org/gradle/wrapper/gradle-wrapper/8.7/gradle-wrapper-8.7.jar
        
        # 检查文件类型
        file gradle-wrapper-download.jar
        
        # 如果是有效的jar文件，复制到正确位置
        if file gradle-wrapper-download.jar | grep -q "Java archive"; then
          echo "✅ 下载到有效的jar文件"
          mv gradle-wrapper-download.jar gradle/wrapper/gradle-wrapper.jar
        else
          echo "下载的文件无效，使用方法2"
          # 方法2: 使用gradle命令生成
          # 先安装gradle
          sudo apt-get update
          sudo apt-get install -y gradle
          gradle wrapper
        fi
        
        # 验证文件
        if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "✅ gradle-wrapper.jar已就绪"
          ls -la gradle/wrapper/gradle-wrapper.jar
        else
          echo "❌ 无法获取gradle-wrapper.jar"
          exit 1
        fi
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Build APK
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Verify and commit fix
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ 构建成功！问题已解决"
          
          # 提交修复到仓库
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add gradle/wrapper/gradle-wrapper.jar
          git commit -m "fix: add missing gradle-wrapper.jar" || echo "文件已存在或无变化"
          
          # 尝试推送（需要token权限）
          echo "修复已提交到本地仓库"
          echo "要永久修复，请手动运行: git push"
        else
          echo "❌ 构建失败"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: fixed-apk-v2
        path: app/build/outputs/apk/debug/app-debug.apk