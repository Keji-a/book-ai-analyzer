name: Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug Environment
        run: |
          echo "=== Java Version ==="
          java -version
          echo ""
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          echo ""
          echo "=== Android SDK ==="
          echo $ANDROID_HOME
          ls -la $ANDROID_HOME 2>/dev/null || echo "SDK not found at ANDROID_HOME"
          echo ""
          echo "=== Gradle Version ==="
          ./gradlew --version 2>&1 || echo "Gradle wrapper failed"

      - name: Build with full output
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/build.log
          
      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log