name: Debug Build v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          echo "=== Gradle Exit Code: $? ===" >> /tmp/build.log

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Check Build Output
        run: |
          echo "=== Listing all files ==="
          find . -type f -name "*.apk" 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== app/build directory ==="
          ls -laR app/build/ 2>/dev/null || echo "No build directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/**/*.apk