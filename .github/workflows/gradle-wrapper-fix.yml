name: Gradle Wrapper Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          chmod +x ./gradlew
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          ./gradlew --version
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: List APK
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk