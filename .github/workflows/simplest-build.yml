name: Simplest Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android environment
      run: |
        # Ubuntu环境可能已经有Android SDK
        # 设置环境变量
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        
        # 检查Android SDK
        echo "检查Android SDK..."
        ls -la /usr/local/lib/android/sdk/ || echo "SDK目录不存在"
        
        # 接受许可证（如果需要）
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || echo "许可证已接受"
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build Debug APK
      run: |
        echo "开始构建APK..."
        ./gradlew assembleDebug --stacktrace
    
    - name: Verify APK
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK构建成功！"
          echo "APK大小: $(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print \$5}')"
          echo ""
          echo "🎉 最简单的构建成功！"
          echo "说明：Ubuntu环境已预装Android SDK"
        else
          echo "❌ 构建失败"
          echo "需要安装Android SDK"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: simplest-apk
        path: app/build/outputs/apk/debug/app-debug.apk