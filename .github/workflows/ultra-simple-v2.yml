name: Ultra Simple Build v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Install Gradle
        run: |
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d /opt
          echo "Gradle installed"
          /opt/gradle-8.7/bin/gradle --version
          
      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          echo "Working directory: $(pwd)"
          echo "Listing files: $(ls -la)"
          /opt/gradle-8.7/bin/gradle assembleDebug --no-daemon --info 2>&1 | tail -100

      - name: Check APK
        run: |
          cd $GITHUB_WORKSPACE
          echo "Checking for APK..."
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK directory not found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk