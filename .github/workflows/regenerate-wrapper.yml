name: Regenerate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Remove invalid gradle-wrapper.jar
      run: |
        echo "删除无效的gradle-wrapper.jar..."
        rm -f gradle/wrapper/gradle-wrapper.jar
        echo "当前gradle-wrapper.jar状态:"
        ls -la gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo "文件不存在"
    
    - name: Regenerate Gradle Wrapper
      run: |
        echo "重新生成Gradle Wrapper..."
        
        # 方法1: 使用gradle命令生成wrapper
        # 先安装gradle
        echo "安装Gradle..."
        sudo apt-get update
        sudo apt-get install -y gradle
        
        # 生成wrapper
        echo "生成gradle wrapper..."
        gradle wrapper || echo "Gradle wrapper生成失败"
        
        # 验证文件
        if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "✅ gradle-wrapper.jar已生成"
          ls -la gradle/wrapper/gradle-wrapper.jar
          echo "文件类型:"
          file gradle/wrapper/gradle-wrapper.jar
        else
          echo "❌ gradle-wrapper.jar未生成"
          echo "使用方法2: 手动创建"
        fi
    
    - name: Commit regenerated wrapper
      run: |
        echo "提交重新生成的wrapper文件..."
        git config --local user.email "github-actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 添加所有wrapper文件
        git add gradle/wrapper/
        git add gradlew
        git add gradle/wrapper/gradle-wrapper.properties
        
        # 提交
        git commit -m "fix: regenerate gradle wrapper with correct jar file" || echo "没有变化或已提交"
        
        # 尝试推送
        echo "重新生成的wrapper已提交到本地仓库"
        echo "要永久修复，请运行: git push"
    
    - name: Build test
      run: |
        echo "测试构建..."
        chmod +x ./gradlew
        ./gradlew --version || echo "Gradle版本检查失败"