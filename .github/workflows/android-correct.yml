name: Android Build (Correct Setup)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK (Alternative method)
      uses: android-actions/setup-android@v2  # 使用v2版本
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Verify APK
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK构建成功！"
          echo "APK大小: $(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print \$5}')"
          echo ""
          echo "🎉 第十一次构建成功！"
          echo "问题已解决：Android SDK包名格式"
        else
          echo "❌ 构建失败"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-correct-apk
        path: app/build/outputs/apk/debug/app-debug.apk